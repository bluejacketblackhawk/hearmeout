<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self'; media-src blob:; img-src 'self' data:;">
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <h1>Settings</h1>

  <section>
    <h2>Hotkey</h2>
    <p class="dim small">Select text in any app, press this, listen. Press it again (or Esc) to stop.</p>
    <div class="row">
      <span id="hotkey-label" class="kbd">F8</span>
      <button id="rebind">Change…</button>
    </div>
  </section>

  <section>
    <h2>Voice</h2>
    <div class="row">
      <select id="voice"></select>
      <button id="preview">Preview</button>
    </div>
  </section>

  <section>
    <h2>Speed</h2>
    <div class="row">
      <input type="range" id="speed" min="50" max="300" step="5" value="100">
      <span id="speed-label" class="kbd">1.0×</span>
    </div>
  </section>

  <section>
    <h2>Startup</h2>
    <label class="row check">
      <input type="checkbox" id="login">
      <span>Start Hear Me Out when Windows starts</span>
    </label>
  </section>

  <section>
    <h2>The voice model</h2>
    <p id="model-line" class="dim small">Checking…</p>
  </section>

  <footer class="dim small">
    <span id="version"></span>
    <span>MIT licensed · runs entirely on this machine · no telemetry</span>
  </footer>

  <audio id="audio"></audio>
  <script src="settings.js"></script>
</body>
</html>
