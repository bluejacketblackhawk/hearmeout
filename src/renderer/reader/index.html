<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:;">
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <header>
    <div id="brand">
      <span id="brand-mark">)))</span>
      <span id="brand-name">Hear Me Out</span>
    </div>
    <div id="toolbar">
      <select id="voice" title="Voice"></select>
      <select id="speed" title="Speed">
        <option value="75">0.75×</option>
        <option value="100" selected>1×</option>
        <option value="125">1.25×</option>
        <option value="150">1.5×</option>
        <option value="175">1.75×</option>
        <option value="200">2×</option>
        <option value="250">2.5×</option>
        <option value="300">3×</option>
      </select>
      <button id="read" class="primary">Listen</button>
      <button id="export">Export audio</button>
      <button id="settings" class="ghost" title="Settings">&#9881;</button>
    </div>
  </header>

  <main>
    <textarea id="input" placeholder="Paste anything here — an article, a chapter, your own draft — or drop a .txt / .md file. Then press Listen.&#10;&#10;Anywhere else on your PC: select text and press your hotkey (F8 by default)."></textarea>
    <div id="follow" hidden></div>
  </main>

  <footer>
    <span id="stats" class="dim small"></span>
    <span id="status" class="dim small"></span>
  </footer>

  <div id="drop-hint" hidden>Drop the file to load it</div>
  <script src="reader.js"></script>
</body>
</html>
